<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alatka-batch-flow-admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
</head>
<body>
<div class="container mt-4">
    <div id="dagContainer" style="width:100%;height:400px;border:1px solid gray;"></div>
</div>

<script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script>
    mxBasePath = "/webjars/mxgraph/javascript/src/";
</script>
<script th:src="@{/webjars/mxgraph/javascript/mxClient.min.js}"></script>
<script>
    initDAG();

    function initDAG() {
        let graph = new mxGraph($('#dagContainer')[0]);
        let parent = graph.getDefaultParent();

        graph.setConnectable(true);
        graph.setMultigraph(false);
        graph.getModel().beginUpdate();
        try {
            let a = graph.insertVertex(parent, null, '开始', 50, 50, 60, 30);
            let b = graph.insertVertex(parent, null, '结束', 200, 50, 60, 30);
            graph.insertEdge(parent, null, '', a, b);
        } finally {
            graph.getModel().endUpdate();
        }
        console.log(graph.getModel());
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alatka-batch-flow-admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/tom-select/dist/css/tom-select.bootstrap5.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-table/dist/bootstrap-table.min.css}"/>
</head>
<body>
<div class="container mt-4">
    <div class="card mb-3">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h5 class="mb-0">流程查询</h5>
            <button class="btn btn-sm btn-outline-secondary"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#cardCollapse"
                    aria-expanded="true"
                    aria-controls="cardCollapse">
                <i class="bi bi-arrows-angle-contract"></i>
            </button>
        </div>
        <div class="card-body collapse show" id="cardCollapse">
            <form id="searchForm" class="row g-3">
                <div class="col-md-2">
                    <label for="key" class="form-label">关键字</label>
                    <input type="text" class="form-control" id="key" name="key" placeholder="输入关键字">
                </div>
                <div class="col-md-4">
                    <label for="name" class="form-label">名称</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="输入名称">
                </div>
                <div class="col-md-4">
                    <label for="groupKey" class="form-label">流程组名称</label>
                    <select class="form-select alk-select-groupKey" id="groupKey" name="groupKey">
                        <option value="">全部</option>
                        <option value="default_">默认</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="enabled" class="form-label">是否可用</label>
                    <select class="form-select" id="enabled" name="enabled">
                        <option value="">全部</option>
                        <option value="true" selected>正常</option>
                        <option value="false">禁用</option>
                    </select>
                </div>
                <div class="col-12 text-center">
                    <button type="button" class="btn btn-secondary me-2" id="resetButton">
                        <i class="bi bi-arrow-counterclockwise"></i> 重置
                    </button>
                    <button type="button" class="btn btn-primary" id="searchButton">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div class="col-12 text-end mb-3">
        <button type="button" class="btn btn-sm btn-outline-primary me-5" id="deployButton"
                onclick="showDeployModal()">
            <i class="bi bi-rocket"></i> 部署
        </button>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="graphButton"
                onclick="redirectToGraph()">
            <i class="bi bi-pencil-square"></i> 设计流程图
        </button>
        <button type="button" class="btn btn-sm btn-outline-info" id="addButton"
                onclick="showEditModal('/batch/flow/create', true)">
            <i class="bi bi-plus-lg"></i> 新增
        </button>
        <button type="button" class="btn btn-sm btn-outline-warning" id="editButton"
                onclick="showEditModal('/batch/flow/update', false)">
            <i class="bi bi-pencil-square"></i> 更新
        </button>
        <button type="button" class="btn btn-sm btn-danger" id="deleteButton"
                onclick="showDeleteModal('/batch/flow/delete')">
            <i class="bi bi-trash"></i> 删除
        </button>
    </div>

    <table id="dataTable"
           data-toggle="table"
           data-method="get"
           data-url="/batch/flow/page"
           data-sort-name="id"
           data-sort-order="desc"
           data-striped="true"
           data-pagination="true"
           data-pagination-loop="false"
           data-detail-view="true"
           data-detail-formatter="detailFormatter"
           data-side-pagination="server"
           data-click-to-select="true"
           data-maintain-selected="true">
        <thead>
        <tr>
            <th data-radio="true"></th>
            <th data-field="id">ID</th>
            <th data-field="createAt" data-sortable="true">创建日期</th>
            <th data-field="updateAt" data-sortable="true">更新日期</th>
            <th data-field="key" data-sortable="true">关键字</th>
            <th data-field="name">名称</th>
            <th data-field="listeners" data-formatter="listenersFormatter">监听</th>
            <th data-field="groupKey" data-formatter="groupKeyFormatter">流程组名称</th>
            <th data-field="enabled" data-formatter="enabledFormatter">是否可用</th>
        </tr>
        </thead>
    </table>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑流程</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" id="editId" name="id">
                    <div class="mb-3">
                        <label for="editKey" class="form-label">关键字</label>
                        <input type="text" class="form-control" id="editKey" name="key" required>
                    </div>
                    <div class="mb-3">
                        <label for="editName" class="form-label">名称</label>
                        <input type="text" class="form-control" id="editName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="editListeners" class="form-label">监听</label>
                        <textarea class="form-control" rows="2" id="editListeners" name="listeners"
                                  aria-describedby="editListenersDesc" required></textarea>
                        <div id="editListenersDesc" class="form-text">
                            多个JobExecutionListener逗号分割
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editGroupKey" class="form-label">流程组名称</label>
                        <select class="form-select alk-select-groupKey" id="editGroupKey" name="groupKey" required>
                            <option value="default_">默认</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editEnabled" class="form-label">是否可用</label>
                        <select class="form-select" id="editEnabled" name="enabled" required>
                            <option value="true">正常</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveEditBtn">确认</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">删除流程</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>确定要删除选中的记录？</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="saveDeleteBtn">确认</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="deployModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">部署流程</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="deployForm">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="deployKey" class="form-label">流程</label>
                            <select class="form-select alk-select-deployKey" multiple id="deployKey" name="key"
                                    aria-describedby="deployKeyDesc">
                            </select>
                            <div id="deployKeyDesc" class="form-text">
                                可部署多个流程
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="deployPath" class="form-label">路径</label>
                            <input type="text" class="form-control" id="deployPath" name="path"
                                   aria-describedby="deployPathDesc" required>
                            <div id="deployPathDesc" class="form-text">
                                例如：/deploy 或 /flow/build
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="deployUris" class="form-label">uris</label>
                            <textarea class="form-control" rows="3" id="deployUris" name="uris"
                                      aria-describedby="deployUrisDesc" required></textarea>
                            <div id="deployUrisDesc" class="form-text">
                                多个用逗号分割，例如：192.x.xx.xx:8000,192.xxx.xxx.xxx:8001
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveDeployBtn">确认</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script th:src="@{/webjars/interactjs/dist/interact.min.js}"></script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/bootstrap-table/dist/bootstrap-table.min.js}"></script>
<script th:src="@{/webjars/bootstrap-table/dist/locale/bootstrap-table-zh-CN.min.js}"></script>
<script th:src="@{/webjars/tom-select/dist/js/tom-select.complete.min.js}"></script>
<script th:src="@{/js/infra.js}"></script>
<script th:src="@{/js/table.js}"></script>
<script>
    initGroupSelect();
    initTable();
    initDeployModal();

    function initDeployModal() {
        const $deployKey = $('#deployKey');
        const tomSelect = new TomSelect($deployKey, {
            plugins: ['remove_button'],
            placeholder: '请选择...'
        });
        $deployKey.data('tomSelect-instance', tomSelect);

        $('#saveDeployBtn').off('click').on('click', function (event) {
            const formData = {};
            const $deployForm = $('#deployForm');
            if (!$deployForm[0].checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
                $deployForm.addClass('was-validated');
            } else {
                formData['path'] = $('#deployPath').val();
                formData['uris'] = $('#deployUris').val().split(",").map(item => item.trim());
                const tomSelect = $('#deployKey').data('tomSelect-instance');
                formData['flowIdList'] = tomSelect.getValue();
                httpClient('/batch/flow/deploy', 'POST', formData, function (data) {
                    showSuccessToast('部署成功！');
                    $('#deployModal').modal('hide');
                    refresh();
                });
            }
        });
    }

    function initGroupSelect() {
        httpClient('/batch/flow/group/map', 'GET', null, function (data) {
            const map = new Map(Object.entries(data));
            map.forEach((value, key) => {
                $('.alk-select-groupKey').append($('<option>', {value: key, text: value}))
            });
        });
    }

    function groupKeyFormatter(arg) {
        const keyValuePairs = {};
        $('select#groupKey option').each(function () {
            keyValuePairs[$(this).val()] = $(this).text();
        });
        return keyValuePairs[arg];
    }

    function redirectToGraph() {
        const selections = $('#dataTable').bootstrapTable('getSelections');
        if (selections.length !== 1) {
            showWarningToast("请选择一条记录");
            return;
        }
        const row = selections[0];
        window.location.href = `/batch/flow/graph?flowId=${row.id}`;
    }

    function showDeployModal() {
        httpClient('/batch/flow/undeploy', 'GET', null, function (list) {
            if (list.length === 0) {
                showWarningToast('无待部署流程！');
                return;
            }

            const tomSelect = $('#deployKey').data('tomSelect-instance');
            tomSelect.clear();
            tomSelect.clearOptions();
            const newOptions = list.map(data => ({
                value: data.id,
                text: `${data.key} - ${data.name}`
            }));

            tomSelect.addOptions(newOptions);
            tomSelect.refreshOptions(false);

            $('#deployPath').val('');
            $('#deployUris').val('');

            $('#deployModal').modal('show');
        });

    }

    function detailFormatter(index, row) {
        const containerId = `history-detail-${row.id}`;

        initGraphHistory(row.id, null, (html) => {
            $(`#${containerId}`).html(html);
        });

        return `<div class="p-3 text-center text-muted small">
                    <div class="p-3 bg-light rounded shadow-sm" style="width: 0; min-width: 100%; overflow: hidden;">
                        <div id="${containerId}" class="d-flex flex-nowrap position-relative overflow-x-auto pb-4 pt-2" style="scrollbar-width: thin;">
                        </div>
                    </div>
                </div>`;
    }

    function initGraphHistory(flowId, previousId, callback) {
        const params = new URLSearchParams({
            flowId: flowId
        });
        if (previousId !== null) {
            params.append('previousId', previousId);
        }
        httpClient(`/batch/flow/graph/history?${params.toString()}`, 'GET', null, function (list) {
            let html = list.map((item) => `
                <div id="history-node-${item.id}" class="px-4 text-center position-relative" style="min-width: 150px; z-index: 1; background: linear-gradient(to bottom, transparent 34px, #dee2e6 34px, #dee2e6 36px, transparent 36px);">
                    <div class="rounded-circle mx-auto mb-2 d-flex align-items-center justify-content-center bg-light" style="width: 32px; height: 32px;">
                        <div class="rounded-circle ${item.current ? 'bg-primary shadow' : 'bg-secondary opacity-50'}" style="width: 14px; height: 14px;"></div>
                    </div>
                    <div class="fw-bold small ${item.current ? 'text-primary' : 'text-dark'}">${item.status}</div>
                    <div class="text-muted" style="font-size: 0.7rem;">${item.updateAt || item.createAt}</div>
                    <div class="d-flex justify-content-center align-items-center mt-2 gap-1">
                        <a href="/batch/flow/graph?flowId=${flowId}&id=${item.id}" class="btn btn-sm btn-outline-primary py-0 px-2" style="font-size: 0.65rem;">查看</a>
                        <button class="btn btn-sm btn-outline-danger py-0 px-2" style="font-size: 0.65rem;" onclick="deleteGraph('${item.id}')">
                           <i class="fa fa-trash-o"></i>删除
                        </button>
                    </div>
                </div>
            `).join('');

            const lastId = list[list.length - 1].previousId;
            const moreHtml = lastId ? `
                <div id="more-history-button-${lastId}" class="d-flex align-items-center more-node ps-2" style="min-width: 80px; z-index: 1;">
                    <div class="position-absolute" style="top: 34px; left: 0; width: 40px; border-top: 2px solid #dee2e6; z-index: 0;"></div>
                    <div class="bg-light position-relative d-flex align-items-center justify-content-center" style="z-index: 1; height: 100%;">
                        <button class="btn btn-sm btn-white border shadow-sm p-0 d-flex flex-column align-items-center justify-content-center"
                                style="width: 28px; height: 70px; border-radius: 15px; background: white;"
                                onclick="moreGraphHistory('${flowId}', '${lastId}')">
                            <i class="bi bi-chevron-right text-primary mb-1" style="font-size: 0.8rem; -webkit-text-stroke: 1px;"></i>
                            <span style="font-size: 0.65rem; writing-mode: vertical-lr; letter-spacing: 0.2rem; margin-top: 2px;"
                                  class="text-muted fw-bold">更多</span>
                        </button>
                    </div>
                </div>` : '';

            callback(html + moreHtml);
        });
    }

    function moreGraphHistory(flowId, previousId) {
        initGraphHistory(flowId, previousId, (html) => {
            $(`#more-history-button-${previousId}`).remove();
            $(`#history-detail-${flowId}`).append(html);
        });
    }

    function deleteGraph(id) {
        httpClient(`/batch/flow/graph/delete?id=${id}`, 'DELETE', null, function (data) {
            $(`#history-node-${id}`).remove();
            showSuccessToast("删除成功！");
        });
    }

    function listenersFormatter(arg) {
        if (!arg) {
            return '';
        }
        const tags = arg.split(',');
        let html = '';
        tags.forEach(function (tag) {
            html += '<span class="badge bg-primary">' + tag + '</span> ';
        });
        return html;
    }

</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cn">
<head>
    <meta charset="UTF-8">
    <title>alatka-batch-flow-admin</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}"/>
    <style>
        .btn-custom-indigo {
            color: #6610f2 !important;
            border-color: #6610f2 !important;
            background-color: transparent;
        }

        .btn-custom-indigo:hover {
            color: #6610f2 !important;
            border: 1px dashed #6610f2 !important;
            background-color: #f8f5ff;
        }

        .btn-custom-orange {
            color: #fd7e14 !important;
            border-color: #fd7e14 !important;
            background-color: transparent;
        }

        .btn-custom-orange:hover {
            color: #ffffff !important;
            background-color: #fd7e14 !important;
            border-color: #fd7e14 !important;
        }
    </style>
</head>
<body class="vh-100 d-flex flex-column overflow-hidden bg-light">

<nav class="navbar navbar-dark bg-dark flex-shrink-0">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Spring Batch Job Editor</span>
        <div class="d-flex">
            <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="window.history.back()">
                <i class="bi bi-arrow-left"></i> 返回
            </button>
            <button class="btn btn-success btn-sm me-2" onclick="showSaveModal()">
                <i class="bi bi-save"></i> 保存为最新
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid flex-grow-1">
    <div class="row h-100">
        <div class="col-md-3 col-lg-2 border-end bg-white d-flex flex-column p-0 shadow-sm">
            <div id="toolbarContainer" class="p-2 border-bottom bg-white overflow-auto">
                <h6 class="fw-bold border-bottom pb-2 mb-3 small">组件</h6>
                <div class="mb-3">
                    <small class="text-muted d-block mb-2 fw-bold" style="font-size: 0.7rem;">流程边界</small>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" id="startComponent"
                                class="btn btn-sm btn-outline-success d-flex align-items-center">
                            <i class="bi bi-play-circle me-1"></i>Start
                        </button>
                        <button type="button" id="endComponent"
                                class="btn btn-sm btn-outline-danger d-flex align-items-center">
                            <i class="bi bi-pause-circle me-1"></i>End
                        </button>
                        <button type="button" id="stoppedComponent"
                                class="btn btn-sm btn-outline-danger d-flex align-items-center">
                            <i class="bi bi-pause-circle me-1"></i>Stopped
                        </button>
                        <button type="button" id="failedComponent"
                                class="btn btn-sm btn-outline-danger d-flex align-items-center">
                            <i class="bi bi-pause-circle me-1"></i>Failed
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <small class="text-muted d-block mb-2 fw-bold" style="font-size: 0.7rem;">逻辑步骤</small>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" id="stepComponent"
                                class="btn btn-sm btn-outline-primary d-flex align-items-center">
                            <i class="bi bi-app-indicator me-1"></i>Step
                        </button>
                        <button type="button" id="flowComponent"
                                class="btn btn-sm btn-custom-indigo d-flex align-items-center">
                            <i class="bi bi-stack me-1"></i>Flow
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <small class="text-muted d-block mb-2 fw-bold" style="font-size: 0.7rem;">流程控制</small>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" id="decisionComponent"
                                class="btn btn-sm btn-outline-secondary d-flex align-items-center">
                            <i class="bi bi-list-check me-1"></i>Decision
                        </button>
                        <button type="button" id="splitComponent"
                                class="btn btn-sm btn-custom-orange d-flex align-items-center">
                            <i class="bi bi-diagram-3 me-1"></i>Split
                        </button>
                        <button type="button" id="joinComponent"
                                class="btn btn-sm btn-node btn-custom-orange d-flex align-items-center">
                            <i class="bi bi-diagram-3 me-1"
                               style="display: inline-block; transform: rotate(180deg);"></i>Join
                        </button>
                    </div>
                </div>
            </div>
            <div id="propertyContainer" class="flex-grow-1 p-2 overflow-auto bg-light position-relative">
                <h6 class="fw-bold border-bottom pb-2 mb-3 small">节点属性</h6>
            </div>
        </div>
        <div id="graphContainer" class="col-md-9 col-lg-10 p-0 bg-white"
             style="background-image: radial-gradient(#dee2e6 1px, transparent 1px); background-size: 20px 20px;">
        </div>
    </div>
</div>
<div class="modal fade" id="saveModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">确认保存</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>保存后会覆盖最新待部署流程图，确定保存吗？</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveBtn">确认</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script>window.mxBasePath = "/webjars/mxgraph/javascript/src/";</script>
<script th:src="@{/webjars/mxgraph/javascript/mxClient.min.js}"></script>
<script th:src="@{/js/baseNode.js}"></script>
<script th:src="@{/js/jobFlow.js}"></script>
<script th:src="@{/js/infra.js}"></script>
<script>
    const loader = {
        jobFlow: null,
        init: function () {
            this.jobFlow = new JobFlow("graphContainer", "propertyContainer");
            this.jobFlow.bindToolbarComponent('startComponent', BaseNode.NODE_START);
            this.jobFlow.bindToolbarComponent('endComponent', BaseNode.NODE_END);
            this.jobFlow.bindToolbarComponent('stoppedComponent', BaseNode.NODE_STOPPED);
            this.jobFlow.bindToolbarComponent('failedComponent', BaseNode.NODE_FAILED);
            this.jobFlow.bindToolbarComponent('decisionComponent', BaseNode.NODE_DECISION);
            this.jobFlow.bindToolbarComponent('splitComponent', BaseNode.NODE_SPLIT);
            this.jobFlow.bindToolbarComponent('joinComponent', BaseNode.NODE_JOIN);
            this.jobFlow.bindToolbarComponent('stepComponent', BaseNode.NODE_STEP);
            this.jobFlow.bindToolbarComponent('flowComponent', BaseNode.NODE_FLOW);

            const urlParams = new URLSearchParams(window.location.search);
            const flowId = urlParams.get('flowId');
            const id = urlParams.get('id');
            let url = `/batch/flow/graph/getData?flowId=${flowId}${id ? '&id=' + id : ''}`;
            httpClient(url, 'GET', null, (data) => {
                if (data) {
                    this.jobFlow.importModel(data);
                } else {
                    this.jobFlow.addStartNode(60, 240);
                }
            });
        },
        saveGraph: function () {
            const urlParams = new URLSearchParams(window.location.search);
            const flowId = urlParams.get('flowId');
            const data = this.jobFlow.exportModel();
            const req = {'flowId': flowId, 'data': data};

            httpClient('/batch/flow/graph/save', 'POST', req, function (data) {
                showSuccessToast("保存成功！！");
            });
        }
    };
    loader.init();

    function showSaveModal() {
        $('#saveModal').modal('show');
        $('#saveBtn').off('click').on('click', function () {
            loader.saveGraph();
            $('#saveModal').modal('hide');
        });
    }
</script>
</body>
</html>
